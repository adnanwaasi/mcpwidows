version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meme
      POSTGRES_USER: adnan
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adnan"]
      interval: 5s
      timeout: 5s
      retries: 5

  codegenlinux:
    build:
      context: .
      dockerfile: Dockerfile.linux
    image: codegenlinux
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=meme
      - DB_USER=adnan
      - DB_PASSWORD=123
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host

volumes:
  postgres_data:
